<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    
    <title>Frontend Mentor | Blog preview card</title>

    <link rel="stylesheet" href="main.css">
</head>
<body>
    <main class="page">
        <div class="card" id="card">
            <div class="child-card">
                <img class="image-card" src="assets/images/illustration-article.svg" alt="illustration-article">
            </div>

            <div class="child-card info-card">
                <ul class="custom-ul" id="tag">
                    <li><span>Learning</span></li>
                </ul>
                <div class="date" id="date">
                    <p>Published 21 Dev 2023</p>
                </div>
                <div class="" id="title">
                    <h1>HTML & CSS foundations</h1>
                </div>
                <div class="" id="description">
                    <p class="description">These languages are the backbone of every website, defining structure, content, and presentation</p>
                </div>
            </div>
            
            <footer class="child-card info" id="info">
                <img class="info-child img-info" src="assets/images/image-avatar.webp" alt="image-avatar">
                <div class="info-child" id="nickname">
                    <p>Greg Hooper</p>
                </div>
            </footer>
        </div>
    </main>
</body>
</html>
